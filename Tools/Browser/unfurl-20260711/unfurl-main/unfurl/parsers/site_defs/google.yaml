# Google URL parser definition (non-search endpoints)
# Search-specific parameters (ei, ved, gs_l, aqs, etc.) are handled
# by parse_google.py. This file covers other Google URL types.
# Parsed by parse_site_defs.py

name: Google
domains:
  - google.com
edge:
  color: green
  title: Google-related Parsing Functions
  label: "G"

# --- /url redirect pages ---
# google.com/url?q=DESTINATION&sa=D&ust=TIMESTAMP&usg=SIGNATURE
query_rules:

  - key: q
    path: /url
    apply:
      hover_only: true
      hover: >-
        The <b>redirect target URL</b> in a Google redirect link (/url).
        Google wraps outbound links through this redirect for
        click tracking and malware warnings. This is <em>not</em> a
        search query — it is the destination the user was sent to.

  - key: url
    path: /url
    apply:
      hover_only: true
      hover: >-
        The <b>redirect target URL</b> in a Google redirect link (/url).
        Alternate parameter name for the redirect target
        (used in some older Google redirect formats).

  - key: sa
    path: /url
    apply:
      hover_only: true
      hover: >-
        Suspected Google redirect action type. Most commonly observed 
        value is <b>t</b>; other observed values include
        <b>f</b>, <b>i</b>, <b>D</b>, <b>U</b>, <b>z</b>, <b>j</b>, & <b>X</b>. 

  - key: usg
    path: /url
    apply:
      hover_only: true
      hover: >-
        Google URL signature. A hash used to verify the redirect
        link was generated by Google and has not been tampered with.

  - key: ust
    path: /url
    apply:
      hover_only: true
      hover: >-
        Google redirect timestamp (microseconds since Unix epoch).
        Believed to indicate when the redirect link was generated
        or when the referring page was loaded.

  - key: ved
    path: /url
    apply:
      hover_only: true
      hover: >-
        Google tracking parameter encoding the link's position and type
        on the referring page. Contains a protobuf-encoded structure.

  - key: rct
    path: /url
    apply:
      hover_only: true
      hover: >-
        Suspected "redirect confirmation type"; typically <b>j</b>.

  - key: source
    path: /url
    apply:
      hover_only: true
      hover: >-
        Google product/surface the redirect originated from. Most common
        value is <b>web</b> (~99%). Other observed values: <b>finance</b>,
        <b>imgres</b> / <b>images</b> (Image Search), <b>blogsearch</b>,
        <b>transpromo</b>, and <code>gbs_*</code> (Google Books).

  - key: cd
    path: /url
    apply:
      hover_only: true
      hover: >-
        Suspected <b>"click depth"</b> — the position (1-based) of the
        clicked result on the referring page. Most values are small
        integers 1–10; longer values are observed but rare. 

  - key: sig2
    path: /url
    apply:
      hover_only: true
      hover: >-
        Secondary signature. 22-character URL-safe base64; values are
        nearly always unique. Purpose not publicly documented; presumed
        cryptographic verification of the redirect, like <code>usg</code>.

  # --- /imgres (image result pages) ---

  - key: imgurl
    apply:
      label: "Image URL: {value}"
      data_type: url
      hover: >-
        The direct URL of the full-size image shown in Google Image results.

  - key: imgrefurl
    apply:
      label: "Image Source Page: {value}"
      data_type: url
      hover: >-
        The URL of the web page that contains/hosts the image.

  - key: h
    path: /imgres
    apply:
      label: "Image Height: {value}px"
      data_type: descriptor
      hover: >-
        The height of the original image in pixels.

  - key: w
    path: /imgres
    apply:
      label: "Image Width: {value}px"
      data_type: descriptor
      hover: >-
        The width of the original image in pixels.

  - key: tbnid
    path: /imgres
    apply:
      hover_only: true
      hover: >-
        Google Image thumbnail ID. A unique identifier for this image
        in Google's index. Can be used to correlate the same image
        across different search sessions.

  - key: docid
    path: /imgres
    apply:
      hover_only: true
      hover: >-
        Google Image document ID. Identifies the web page hosting the
        image in Google's index.

  - key: tbnh
    path: /imgres
    apply:
      label: "Thumbnail Height: {value}px"
      data_type: descriptor
      hover: >-
        The height of the thumbnail image displayed in search results.

  - key: tbnw
    path: /imgres
    apply:
      label: "Thumbnail Width: {value}px"
      data_type: descriptor
      hover: >-
        The width of the thumbnail image displayed in search results.

  - key: iact
    path: /imgres
    apply:
      hover_only: true
      hover: >-
        Suspected "interaction click type" — how the user reached this image result.
        Common values: <b>rc</b> = right-click, <b>hc</b> = hover-click.

  # --- /aclk (ad click tracking) ---
  # google.com/aclk?sa=L&ai=...&sig=AOD64_...&adurl=DESTINATION&...
  # This endpoint records ad clicks and redirects to the advertiser's landing page.

  - key: adurl
    path: /aclk
    apply:
      label: "Ad Destination"
      data_type: descriptor
      hover: >-
        The advertiser's <b>landing page URL</b> (the destination the
        user is sent to after clicking the Google ad).

  - key: ai
    path: /aclk
    apply:
      hover_only: true
      hover: >-
        Opaque blob (URL-safe base64) attached to ad-click
        redirects. The decoded bytes use a non-standard framing (a 1-byte
        prefix before any protobuf content); contents are not
        publicly documented by Google.

  - key: sig
    path: /aclk
    apply:
      hover_only: true
      hover: >-
        Google ad click <b>signature</b>. Verifies the click was generated
        by Google's ad serving infrastructure and has not been tampered with.

  - key: sa
    path: /aclk
    apply:
      hover_only: true
      hover: >-
        Suspected Google ad action type. Nearly always <b>l</b> or <b>L</b>.

  - key: gclid
    path: /aclk
    apply:
      hover_only: true
      hover: >-
        <b>Google Click ID</b> — a unique identifier for this ad click, passed
        to the advertiser's landing page for conversion tracking.

  - key: ctype
    path: /aclk
    apply:
      hover_only: true
      hover: >-
        Suspected "content interaction type" is an integer; meaning is not
        publicly documented by Google. 

  - key: ved
    path: /aclk
    apply:
      hover_only: true
      hover: >-
        Google tracking parameter encoding the ad's position and type on
        the search results page. Contains a protobuf-encoded structure.

  - key: cid
    path: /aclk
    apply:
      hover_only: true
      hover: >-
        Suspected <b>"click identifier"</b>. The value often is a URL-safe 
        base64-encoded 2-field protobuf envelope: a small varint flag
        and an opaque high-entropy payload blob.

  - key: rct
    path: /aclk
    apply:
      hover_only: true
      hover: >-
        Suspected "redirect confirmation type"; typically <b>j</b>.

  - key: nis
    path: /aclk
    apply:
      hover_only: true
      hover: >-
        Suspected <b>"number of impression slots"</b>; possibly the count
        of ad slots visible on the page.

  - key: ase
    path: /aclk
    apply:
      hover_only: true
      hover: >-
        Purpose unknown; typically <b>2</b>.

  - key: category
    path: /aclk
    apply:
      hover_only: true
      hover: >-
        Suspected ad category code. All observed values match
        <b>acrcp_v1_N</b>. 
